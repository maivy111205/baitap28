<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính tổng chia hết cho 3</title>
</head>
<body>

    <form onsubmit="handleSubmit(event)">
        <label>Số đầu:</label>
        <input type="number" id="soDau" required>
        <br><br>
        <label>Số cuối:</label>
        <input type="number" id="soCuoi" required>
        <br><br>
        <button type="submit">Tính Tổng</button>
    </form>

    <h3 id="ketQua"></h3>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
           
            const start = parseInt(document.getElementById("soDau").value);
            const end = parseInt(document.getElementById("soCuoi").value);
            let tong = 0;

         
            for (let i = start; i <= end; i++) {
                if (i % 3 === 0) {
                    tong += i;
                }
            }

           
            document.getElementById("ketQua").innerText = "Tổng các số chia hết cho 3 từ " + start + " đến " + end + " là: " + tong;
            console.log("Tổng là: " + tong);
        }
    </script>
</body>
</html>
